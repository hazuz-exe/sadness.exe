<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="teste.css">
     <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Teste</title>
</head>
<body>
    <div class="rain"></div>

    <header class="site-header">
        <div class="brand">
            <h1>Tristeza</h1>
            <p>apenas sinta oque está dentro de seu corpo.</p>
        </div>
        <nav class="site-menu">
            <ul>
                <li><a href="pagina inicial sad.html">Início</a></li>
                <li><a href="sobre o sentimento.html">Sobre o sentimento</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="teste.html">Teste</a></li>
                <li><a href="imagens.html">Imagens</a></li>
                <li><a href="music.html" title="Música"><i class="fas fa-headphones"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <div class="survey-container">
            <h2>Como você está se sentindo hoje?</h2>
            <p class="subtitle">Marque os sentimentos que você está vivenciando</p>

            <div class="survey-grid">
                <label class="mood-checkbox">
                    <input type="checkbox" class="mood-input" data-mood="vazio">
                    <div class="checkbox-box">
                        <i class="fas fa-circle-notch"></i>
                        <span>Vazio</span>
                    </div>
                    
                </label>

                <label class="mood-checkbox">
                    <input type="checkbox" class="mood-input" data-mood="cansaco">
                    <div class="checkbox-box">
                        <i class="fas fa-dumbbell"></i>
                        <span>Cansaço</span>
                    </div>
                    
                </label>

                <label class="mood-checkbox">
                    <input type="checkbox" class="mood-input" data-mood="solidao">
                    <div class="checkbox-box">
                        <i class="fas fa-person"></i>
                        <span>Solidão</span>
                    </div>
                    
                </label>

                <label class="mood-checkbox">
                    <input type="checkbox" class="mood-input" data-mood="confusao">
                    <div class="checkbox-box">
                        <i class="fas fa-circle-question"></i>
                        <span>Confusão</span>
                    </div>
                    
                </label>

                <label class="mood-checkbox">
                    <input type="checkbox" class="mood-input" data-mood="silencio">
                    <div class="checkbox-box">
                        <i class="fas fa-volume-mute"></i>
                        <span>Silêncio</span>
                    </div>
                </label>

                <label class="mood-checkbox">
                    <input type="checkbox" class="mood-input" data-mood="perdido">
                    <div class="checkbox-box">
                        <i class="fas fa-map"></i>
                        <span>Perdido</span>
                    </div>
                    
                </label>

                <label class="mood-checkbox">
                    <input type="checkbox" class="mood-input" data-mood="medo">
                    <div class="checkbox-box">
                        <i class="fas fa-ghost"></i>
                        <span>Medo</span>
                    </div>
                    
                </label>
            </div>
        </div>
    </main>

</body>
</html>
